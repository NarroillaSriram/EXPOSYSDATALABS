server {
    listen 80;
    server_name _; # Catch-all for IP address

    # Reverse proxy for Python Flask App (Gunicorn)
    location / {
        include proxy_params;
        proxy_pass http://unix:/var/www/exposys/exposys.sock;
    }

    # Reverse proxy for Node.js Certificate Backend
    location /certificate-api/ {
        proxy_pass http://localhost:3000/; # Node.js default port
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Serve Static Files directly for performance
    location /static/ {
        alias /var/www/exposys/static/;
    }

    # Serve Uploads directly
    location /uploads/ {
        alias /var/www/exposys/uploads/;
    }
}
